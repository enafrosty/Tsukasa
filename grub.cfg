# GRUB config for Tsukasa OS.
# Placed in iso/boot/grub/ by the Makefile.

set timeout=5
set default=0

# Graphics terminal: 1024x768x32 linear framebuffer.
terminal_output gfxterm
set gfxpayload=1024x768x32

menuentry "Tsukasa" {
    multiboot  /boot/tsukasa.bin
    # FAT12 ramdisk — loaded as Multiboot module.
    # Build with: make initrd
    module     /boot/initrd.img "initrd"
    boot
}
